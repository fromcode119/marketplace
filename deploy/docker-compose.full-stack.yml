# Docker Compose for Marketplace Hub on Coolify.
# Usage: docker compose --project-directory . -f deploy/docker-compose.full-stack.yml up
# Paths are repo-root relative because Coolify runs compose with the repository root
# as the project directory.
# On Coolify, do not publish host ports for the gateway. Let the Coolify proxy
# attach over the external network instead.

services:
  gateway:
    image: ${COOLIFY_RESOURCE_UUID:-marketplace-hub}:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - FRAMEWORK_REPO_URL=${FRAMEWORK_REPO_URL:-https://github.com/fromcode119/framework.git}
        - FRAMEWORK_REF=${FRAMEWORK_REF:-main}
        - NEXT_PUBLIC_ADMIN_BASE_PATH=/admin
        - NEXT_PUBLIC_API_URL=${MARKETPLACE_URL:-http://marketplace.fromcode.com}
        - NEXT_PUBLIC_ADMIN_AI_ENABLED=${NEXT_PUBLIC_ADMIN_AI_ENABLED:-false}
    depends_on:
      - api
      - admin
    environment:
      - API_TARGET=http://api:4000
      - ADMIN_TARGET=http://admin:3001
      - ADMIN_URL=${MARKETPLACE_ADMIN_URL:-http://marketplace.fromcode.com/admin}
      - ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_AI_ENABLED=${NEXT_PUBLIC_ADMIN_AI_ENABLED:-false}
      - NODE_ENV=production
    expose:
      - "80"
    volumes:
      - marketplace_plugins:/app/marketplace/plugins
      - marketplace_themes:/app/marketplace/themes
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy
      - marketplace
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  api:
    image: ${COOLIFY_RESOURCE_UUID:-marketplace-hub}:latest
    command: ["sh", "-lc", "mkdir -p /app/marketplace/data /app/marketplace/plugins /app/marketplace/themes /app/marketplace/source && PORT=${MARKETPLACE_PORT:-4000} node node_modules/@fromcode119/api/dist/bin.js"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/app/marketplace/data/marketplace.db}
      - DB_DIALECT=${DB_DIALECT:-sqlite}
      - JWT_SECRET=${JWT_SECRET}
      - BUILD_SERVER_SECRET_KEY=${BUILD_SERVER_SECRET_KEY}
      - NODE_ENV=production
      - CORS_ALLOWED_DOMAINS=${CORS_ALLOWED_DOMAINS:-marketplace.fromcode.com}
      - ADMIN_URL=${MARKETPLACE_ADMIN_URL:-http://marketplace.fromcode.com/admin}
      - FRONTEND_URL=${MARKETPLACE_URL:-http://marketplace.fromcode.com}
      - ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_AI_ENABLED=${NEXT_PUBLIC_ADMIN_AI_ENABLED:-false}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - AUTO_BUILD_INTERVAL_MINUTES=${AUTO_BUILD_INTERVAL_MINUTES:-0}
    volumes:
      - marketplace_data:/app/marketplace/data
      - marketplace_plugins:/app/marketplace/plugins
      - marketplace_themes:/app/marketplace/themes
      - build_cache:/app/marketplace/source
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - marketplace
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

  admin:
    image: ${COOLIFY_RESOURCE_UUID:-marketplace-hub}:latest
    command: ["sh", "-lc", "ADMIN_PORT=3001 node /app/marketplace/node_modules/@fromcode119/admin/scripts/admin.js"]
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ADMIN_URL=${MARKETPLACE_ADMIN_URL:-http://marketplace.fromcode.com/admin}
      - NEXT_PUBLIC_API_URL=${MARKETPLACE_URL:-http://marketplace.fromcode.com}
      - ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_BASE_PATH=/admin
      - NEXT_PUBLIC_ADMIN_AI_ENABLED=${NEXT_PUBLIC_ADMIN_AI_ENABLED:-false}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - marketplace
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  marketplace:
  proxy:
    name: ${COOLIFY_RESOURCE_UUID}
    external: true

volumes:
  marketplace_data:
  marketplace_plugins:
  marketplace_themes:
  build_cache:
