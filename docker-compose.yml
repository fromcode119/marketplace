# Marketplace Hub - Independent docker-compose
services:
  marketplace-db:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fromcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketplace_password}
      POSTGRES_DB: ${POSTGRES_DB:-fromcode_marketplace}
    volumes:
      - marketplace_postgres_data:/var/lib/postgresql/data
    networks:
      - marketplace
    restart: unless-stopped

  marketplace-redis:
    image: redis:7-alpine
    networks:
      - marketplace
    restart: unless-stopped

  marketplace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    env_file: .env
    depends_on:
      - marketplace-db
      - marketplace-redis
    volumes:
      - ./plugins:/app/marketplace/plugins
      - ./themes:/app/marketplace/themes
      - ./uploads:/app/marketplace/uploads
    networks:
      marketplace:
      docker_web:
        aliases:
          - marketplace
          - marketplace.framework.local
          - marketplace.fromcode.local

networks:
  marketplace:
  docker_web:
    external: true
    name: docker_web

volumes:
  marketplace_postgres_data:
